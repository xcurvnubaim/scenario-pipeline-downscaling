# U-Net model configuration
#
# Consumed by hydra.utils.instantiate (train.py) or by build_model().
# The _target_ key tells Hydra which class to instantiate.

_target_: src.models.unet.UNet

in_channels: 1
out_channels: 1
features:
  - 64
  - 128
  - 256
  - 512
scale_factor: 1    # set > 1 to upsample inside the U-Net
