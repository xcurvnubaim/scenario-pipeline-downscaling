# Base Hydra configuration for scenario-pipeline-downscaling
#
# Usage:
#   python train.py                          # use defaults
#   python train.py model=resnet             # swap to ResNet
#   python train.py training.epochs=50      # override a single value
#   python train.py +experiment=my_run      # enable an experiment override group
#
# All values can be overridden from the command line using Hydra's standard
# override syntax (key=value).  Config groups (model, data) are loaded from
# their respective sub-directories.

defaults:
  - model: unet
  - _self_

data:
  forecast_zarr_path: "../data/ifs_lowres_indonesia_2018-2022.zarr"
  truth_zarr_path: "../data/era5_indonesia_2018-2022.zarr"
  variables:
    - "10m_u_component_of_wind"
    - "10m_v_component_of_wind"
    - "2m_temperature"
    - "total_precipitation_24hr"
  tp_var_name: "total_precipitation_24hr"
  lead_days: 1
  drop_lead0: true
  scale: 6
  low_lat: 24
  low_lon: 32
  batch_size: 16
  num_workers: 2
  train_ratio: 0.7
  val_ratio: 0.15

training:
  seed: 42
  mode: "supervised"  # "supervised" | "gan"
  epochs: 100
  learning_rate: 5.0e-4
  weight_decay: 1.0e-4
  patience: 7
  gradient_clip: 1.0
  loss_mode: "dssim"  # "dssim" | "dssim+mse" | "dssim+grad"
  dssim_alpha: 0.8
  dssim_beta: 0.2
  checkpoint_dir: "checkpoints"
  best_model_name: "best_unet.pt"

  gan:
    discriminator_base_channels: 64
    learning_rate_g: 1.0e-4
    learning_rate_d: 1.0e-4
    lambda_adv: 0.001
    lambda_per: 1.0
    best_model_name: "best_gan.pt"

evaluation:
  print_every_n_epochs: 5

hydra:
  run:
    dir: "outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}"
  sweep:
    dir: "multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}"
    subdir: "${hydra.job.num}"
  job:
    chdir: false
